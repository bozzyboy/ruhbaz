name: Turkish UTF-8 Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  utf8-turkish-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run UTF-8/Turkish guard
        run: npm run check:turkish:utf8
