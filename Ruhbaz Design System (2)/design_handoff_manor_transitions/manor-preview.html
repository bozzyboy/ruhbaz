<style>
  :root{
    --ruh-font-ui:'Nunito',-apple-system,system-ui,sans-serif;
    --ruh-font-display:'Cormorant Garamond',Georgia,serif;
    --ruh-ease:cubic-bezier(.22,1,.36,1);
    --ruh-aura-day:linear-gradient(165deg,#F6EFE6 0%,#EBE2D6 36%,#D9D0E0 68%,#AFCBE0 100%);
    --ruh-aura-night:linear-gradient(165deg,#221C31 0%,#171626 42%,#14141E 70%,#10131F 100%);
    --ruh-shadow-card:0 10px 26px rgba(74,47,90,0.16);
    --ruh-shadow-soft:0 6px 16px rgba(74,47,90,0.12);
    --ruh-shadow-lift:0 26px 60px rgba(74,47,90,0.34);
    --ruh-glow-gold:0 0 0 1px rgba(201,162,74,0.35),0 6px 20px rgba(201,162,74,0.28);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#E3D9CC;font-family:var(--ruh-font-ui);padding:22px}
  @keyframes ruhRise {from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:translateY(0)}}
  @keyframes ruhDrift{0%,100%{transform:translateY(0);opacity:.32}50%{transform:translateY(-10px);opacity:.8}}
  @keyframes ruhGlow {0%,100%{opacity:.45;transform:scale(1)}50%{opacity:.85;transform:scale(1.05)}}
  @keyframes ruhFog  {0%,100%{transform:translate3d(0,0,0) scale(1.05)}50%{transform:translate3d(-3%,2%,0) scale(1.12)}}
  @keyframes ruhSheet{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
  @keyframes ruhEq   {0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
  @keyframes ruhPetal{to{opacity:0;transform:translate(var(--px,20px),60px) rotate(var(--pr,60deg))}}
  @keyframes ruhSpin {to{transform:rotate(360deg)}}
  .ruh-win{animation:ruhRise .6s var(--ruh-ease) both}
  .ruh-win:nth-child(1){animation-delay:.05s}.ruh-win:nth-child(2){animation-delay:.12s}.ruh-win:nth-child(3){animation-delay:.19s}
  .ruh-card{animation:ruhRise .5s var(--ruh-ease) both}
  [data-motion="off"] [data-anim],[data-motion="off"] .ruh-win,[data-motion="off"] .ruh-card{animation:none!important}
  .ruh-scroll{scrollbar-width:thin;scrollbar-color:rgba(201,162,74,.5) transparent}
  .ruh-scroll::-webkit-scrollbar{width:7px}
  .ruh-scroll::-webkit-scrollbar-thumb{background:rgba(201,162,74,.5);border-radius:999px;border:2px solid transparent;background-clip:padding-box}
  .ruh-xrow{scrollbar-width:none}.ruh-xrow::-webkit-scrollbar{display:none}
  .bezel{position:relative;width:390px;height:812px;border-radius:52px;padding:11px;background:linear-gradient(160deg,#FBF3E9,#E4D5C6);box-shadow:0 40px 90px rgba(74,47,90,.28),inset 0 0 0 1px rgba(255,255,255,.6)}
  .notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:116px;height:28px;border-radius:999px;background:rgba(40,28,44,.82);z-index:60}
  .win{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:9px;text-align:center;cursor:pointer;padding:20px 8px 14px;min-height:150px;border-radius:64px 64px 18px 18px;background:var(--door-bg);border:1px solid var(--door-border);box-shadow:var(--ruh-shadow-card),inset 0 1px 0 rgba(255,255,255,.5);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);overflow:hidden;transition:transform .14s var(--ruh-ease)}
  .win:active{transform:scale(.96)}
  .med{position:relative;width:48px;height:48px;border-radius:999px;display:grid;place-items:center;background:var(--medallion-bg);box-shadow:inset 0 0 0 1px var(--medallion-ring),0 6px 14px rgba(74,47,90,.12)}
  .med .glow{position:absolute;inset:-4px;border-radius:999px;border:1px solid var(--medallion-ring);opacity:.55;animation:ruhGlow 7s ease-in-out infinite;pointer-events:none}
  .soonbadge{position:absolute;top:9px;right:9px;z-index:2;font-size:8px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#7A5A12;background:rgba(232,201,138,.85);border:1px solid rgba(201,162,74,.6);padding:2px 6px;border-radius:999px;white-space:nowrap}
  .backbtn{flex:none;display:flex;align-items:center;gap:5px;cursor:pointer;padding:8px 13px 8px 10px;border-radius:999px;background:var(--door-bg);border:1px solid var(--door-border);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);box-shadow:var(--ruh-shadow-soft);font-family:var(--ruh-font-ui);font-size:12.5px;font-weight:700;color:var(--door-ink)}
  .backbtn:active{transform:scale(.96)}
  .pill{cursor:pointer;border-radius:999px;font-family:var(--ruh-font-ui);font-weight:800}
  .sendbtn{border:1px solid var(--send-border);background:var(--send-bg);box-shadow:var(--send-shadow);color:#FFF6EA}
  .typecard{position:relative;display:flex;flex-direction:row;align-items:center;gap:11px;text-align:left;cursor:pointer;padding:13px 14px;min-height:60px;border-radius:17px;background:var(--door-bg);border:1px solid var(--door-border);box-shadow:var(--ruh-shadow-card),inset 0 1px 0 rgba(255,255,255,.5);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);transition:transform .16s var(--ruh-ease)}
  .typecard:hover{transform:translateY(-2px)}.typecard:active{transform:scale(.97)}
  .lab{font-family:var(--ruh-font-ui);font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);text-shadow:var(--tsh)}
  .lab2{font-family:var(--ruh-font-ui);font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--door-sub)}
  .fld{width:100%;box-sizing:border-box;padding:12px;border-radius:14px;border:1px solid var(--door-border);background:var(--field-bg);font-family:var(--ruh-font-ui);font-size:14px;font-weight:700;color:var(--door-ink);outline:none}
  .sel{-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%23B98F3C' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 11px center;padding-right:30px;cursor:pointer}
  option{background-color:var(--opt-bg);color:var(--opt-ink)}
  .devbar{display:flex;gap:8px;align-items:center;font-family:var(--ruh-font-ui);font-size:12px;color:#5A4A52}
  .devbar button{cursor:pointer;border:1px solid rgba(140,110,70,.4);background:rgba(255,255,255,.55);border-radius:999px;padding:7px 14px;font-weight:700;color:#4A2F5A;font-family:var(--ruh-font-ui)}
  .devbar button.on{background:#C9A24A;color:#fff;border-color:#C9A24A}
</style>

  function buildDaisy(){
    var host=el('ikDaisy');if(!host||host.dataset.built)return;host.dataset.built='1';host.innerHTML='';
    var word=el('ikDaisyWord');if(word)word.textContent='';
    var N=12,cx=75,cy=75,R=48,ns='http://www.w3.org/2000/svg';
    var svg=document.createElementNS(ns,'svg');svg.setAttribute('viewBox','0 0 150 150');svg.setAttribute('width','150');svg.setAttribute('height','150');
    var petals=[];
    for(var i=0;i<N;i++){var ang=(i/N)*Math.PI*2;var px=cx+Math.cos(ang)*R,py=cy+Math.sin(ang)*R;var p=document.createElementNS(ns,'ellipse');p.setAttribute('cx',px);p.setAttribute('cy',py);p.setAttribute('rx','7');p.setAttribute('ry','17');p.setAttribute('fill','#FBF4E6');p.setAttribute('stroke','rgba(201,162,74,0.5)');p.setAttribute('stroke-width','1');p.setAttribute('transform','rotate('+(ang*180/Math.PI+90)+' '+px+' '+py+')');p.style.cursor='pointer';p.style.transition='opacity .25s';svg.appendChild(p);petals.push(p);}
    var core=document.createElementNS(ns,'circle');core.setAttribute('cx',cx);core.setAttribute('cy',cy);core.setAttribute('r','17');core.setAttribute('fill','#E8C98A');core.setAttribute('stroke','rgba(201,162,74,0.6)');core.setAttribute('stroke-width','1.5');core.style.cursor='pointer';svg.appendChild(core);
    host.appendChild(svg);
    var idx=0,words=['EVET','HAYIR'];
    function pluck(){if(idx>=petals.length)return;var p=petals[idx];p.style.setProperty('--px',(Math.random()*50-25)+'px');p.style.setProperty('--pr',(Math.random()*120-60)+'deg');if(S.motion)p.style.animation='ruhPetal .7s ease-in forwards';else p.style.opacity='0';p.style.pointerEvents='none';var w=el('ikDaisyWord');if(w)w.textContent=words[idx%2];idx++;}
    petals.forEach(function(p){p.addEventListener('click',pluck);});core.addEventListener('click',pluck);
  }
